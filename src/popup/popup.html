<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src data: blob:; style-src 'unsafe-inline';">
  <title>WriteThatDown</title>
  <style>
    body { width: 250px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fcfcfc; }
    .controls { display: flex; flex-direction: column; gap: 12px; }
    .section { display: flex; flex-direction: column; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .section:last-child { border-bottom: none; }
    label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 2px; }
    input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    button { padding: 8px; cursor: pointer; border-radius: 4px; border: 1px solid #ddd; background: white; font-size: 13px; transition: all 0.2s; }
    button:hover:not(:disabled) { background: #f0f0f0; }
    button:disabled { color: #ccc; cursor: not-allowed; }
    .primary-btn { background: #007bff; color: white; border-color: #007bff; font-weight: bold; }
    .primary-btn:hover:not(:disabled) { background: #0069d9; }
    .primary-btn:disabled { background: #a0c4ff; color: #ddd; border-color: #a0c4ff; }
    .pause-active { background: #ffc107; color: #333; border-color: #eab308; font-weight: bold; }
    .pause-active:hover:not(:disabled) { background: #eab308; }
    h3 { margin: 0 0 10px 0; font-size: 16px; color: #333; text-align: center; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  </style>
</head>
<body>
  <div class="controls">
    <h3>Guide Creator</h3>

    <div class="section">
      <label>Guide Title</label>
      <input type="text" id="guideTitle" placeholder="My How-to Guide" value="User Guide">
    </div>

    <div class="section">
      <button id="startBtn" class="primary-btn">Start Recording</button>
      <div class="btn-group">
        <button id="pauseBtn" disabled>Pause</button>
        <button id="stopBtn" disabled>Stop</button>
      </div>
    </div>

    <div class="section">
      <button id="editBtn" disabled style="width:100%;">Edit Guide</button>
    </div>

    <div class="section">
      <label>Export As</label>
      <div class="btn-group">
        <button id="exportPdfBtn" disabled>PDF</button>
        <button id="exportMdBtn" disabled>Markdown</button>
      </div>
      <button id="copyClipboardBtn" disabled style="margin-top: 8px; width: 100%;">Copy to Clipboard</button>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
